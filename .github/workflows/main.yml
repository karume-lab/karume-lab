name: Generate Daily Graph
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Determine MODE
        run: |
          DAY=$(date +%d)
          if [ $((DAY % 2)) -eq 0 ]; then
            echo "MODE=pacman" >> $GITHUB_ENV
          else
            echo "MODE=snake" >> $GITHUB_ENV
          fi

      - name: Create dist directory
        run: mkdir -p dist

      - name: Generate Pacman
        if: env.MODE == 'pacman'
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move Pacman output to dist
        if: env.MODE == 'pacman'
        run: |
          # Adjust source path to wherever the pacman action actually writes its file
          cp github-contribution-grid-pacman.svg dist/github-contribution-grid-pacman.svg || \
          cp dist/github-contribution-grid-pacman.svg dist/github-contribution-grid-pacman.svg || \
          echo "Check pacman action output path!"

      - name: Generate Snake
        if: env.MODE == 'snake'
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-pacman.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          commit_message: "Update dynamic graph [${{ env.MODE }}]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}