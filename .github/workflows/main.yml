name: Generate Daily Graph

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Determine MODE
        id: determine-mode
        run: |
          DAY=$(date +%d)
          if [ $((DAY % 2)) -eq 0 ]; then
            echo "mode=pacman" >> $GITHUB_OUTPUT
          else
            echo "mode=snake" >> $GITHUB_OUTPUT
          fi

      - name: Create dist directory
        run: mkdir -p dist

      - name: Generate Pacman
        if: steps.determine-mode.outputs.mode == 'pacman'
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max_old_space_size=8192"

      - name: Move Pacman output to dist
        if: steps.determine-mode.outputs.mode == 'pacman'
        run: |
          # The file is already generated inside dist/, so we just rename it
          mv dist/pacman-contribution-graph-dark.svg dist/contribution-graph.svg

      - name: Generate Snake
        if: steps.determine-mode.outputs.mode == 'snake'
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: dist/contribution-graph.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push generated graph
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update contribution graph [${{ steps.determine-mode.outputs.mode }}]"
