name: Generate Daily Graph

on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MODE: ""
    steps:
      - uses: actions/checkout@v3

      # Logic to determine which graph to generate
      - name: Generate Graph
        run: |
          DAY=$(date +%d)
          # If day is even, run Pacman. If odd, run Snake.
          if [ $((DAY % 2)) -eq 0 ]; then
            echo "MODE=pacman" >> $GITHUB_ENV
          else
            echo "MODE=snake" >> $GITHUB_ENV
          fi

      # Run Pacman Action (Only if MODE is pacman)
      - name: Generate Pacman
        if: env.MODE == 'pacman'
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      # Run Snake Action (Only if MODE is snake)
      - name: Generate Snake
        if: env.MODE == 'snake'
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-pacman.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Rename Pacman output if necessary to ensure consistent naming
      # (The Pacman action usually names it github-contribution-grid-pacman.svg)
      # No extra step needed here since we forced the Snake output name above.

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          commit_message: "Update dynamic graph [${{ env.MODE }}]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
