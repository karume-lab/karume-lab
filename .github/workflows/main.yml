name: Generate Daily Graph
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Determine MODE
        id: determine-mode
        run: |
          DAY=$(date +%d)
          if [ $((DAY % 2)) -eq 0 ]; then
            echo "mode=pacman" >> $GITHUB_OUTPUT
          else
            echo "mode=snake" >> $GITHUB_OUTPUT
          fi

      - name: Create dist directory
        run: mkdir -p dist

      - name: Generate Pacman
        if: steps.determine-mode.outputs.mode == 'pacman'
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move Pacman output to dist
        if: steps.determine-mode.outputs.mode == 'pacman'
        run: |
          find . -name "*.svg" ! -path "./dist/*" | head -5
          cp pacman-contribution-graph-dark.svg dist/contribution-graph.svg

      - name: Generate Snake
        if: steps.determine-mode.outputs.mode == 'snake'
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: dist/contribution-graph.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          commit_message: "Update contribution graph [${{ steps.determine-mode.outputs.mode }}]"